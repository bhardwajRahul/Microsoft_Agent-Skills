# Azure Pipeline: Sync Microsoft Learn Docs to Agent Skills
#
# This pipeline:
# 1. Checks out GitHub repo (contains products/, skills/)
# 2. Checks out ADO repo (contains src/, config/)
# 3. Runs docs2skills to crawl and classify docs
# 4. Pushes results back to GitHub repo

trigger: none

schedules:
  - cron: "0 2 * * *"  # Daily at 2:00 AM UTC
    displayName: Run every day
    branches:
      include:
        - main
    always: true

variables:
  - name: pythonVersion
    value: '3.12'
  - name: azureOpenAIEndpoint
    value: 'https://your-resource.openai.azure.com'  # TODO: Update this

stages:
  - stage: __default
    jobs:
      - job: Job
        pool:
          vmImage: ubuntu-latest
        timeoutInMinutes: 60

        steps:
          # 1. Checkout GitHub repo (self - contains products/, skills/)
          - task: 6d15af64-176c-496d-b583-fd2ae21d4df4@1
            displayName: 'Checkout GitHub repo'
            inputs:
              repository: self
              persistCredentials: true

          # 2. Checkout ADO repo (source code)
          - task: 6d15af64-176c-496d-b583-fd2ae21d4df4@1
            displayName: 'Checkout ADO repo (code)'
            inputs:
              repository: git://Engineering/Learn.Docs2AgentSkills@refs/heads/create_skills

          # 3. Setup Python
          - task: UsePythonVersion@0
            displayName: 'Setup Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'

          # 4. Install dependencies
          - task: Bash@3
            displayName: 'Install dependencies'
            inputs:
              targetType: inline
              script: |
                cd $(Build.SourcesDirectory)/Learn.Docs2AgentSkills
                pip install --upgrade pip
                pip install -r requirements.txt

          # 5. List products (test run - no Azure OpenAI needed)
          - task: Bash@3
            displayName: 'List products (test)'
            inputs:
              targetType: inline
              script: |
                cd $(Build.SourcesDirectory)/Learn.Docs2AgentSkills

                echo "========================================"
                echo "Testing pipeline - List products"
                echo "========================================"

                python -m src.docs2skills --list-products

                echo "========================================"
                echo "Test completed successfully"
                echo "========================================"

